<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>畑を守る剣 Ver0.3.1</title>
<style>
body{
font-family:sans-serif;
max-width:700px;
margin:auto;
padding:15px;
touch-action:manipulation;
}
button{
font-size:20px;
padding:12px;
margin:8px;
}
</style>
</head>
<body>
<h1>🌾 畑を守る剣 🌾</h1>
<div id="game">
<p>🐔チャボ「コケーー！！」</p>
<button onclick="startGame()">
はじめから
</button>
</div>
<script>
function startGame(){
document.getElementById("game").innerHTML =
"<h2>第1話 はじまりの畑</h2>" +
"<p>👴村長『森で魔物が暴れておる！』</p>" +
"<p>🐔チャボ『コケッ！』</p>" +
"<button onclick='showVillage()'>🏡村へ</button>";
}
function showVillage(){
document.getElementById("game").innerHTML =
"<h2>🏡村</h2>" +
"<p>どこへ行く？</p>" +
"<button onclick='showField()'>🌾畑</button>" +
"<button onclick='showForest()'>🌲森</button>";
}
function showField(){
document.getElementById("game").innerHTML =
"<h2>🌾畑</h2>" +
"<p>作物は元気に育っている。</p>" +
"<p>🐔チャボ『平和が一番コケ〜♪』</p>" +
"<button onclick='showVillage()'>戻る</button>";
}
function showForest(){
document.getElementById("game").innerHTML =
"<h2>🌲森</h2>" +
"<p>👹暴走モグラが現れた！</p>" +
"<p>⚔️勝利！</p>" +
"<button onclick='ending()'>先へ進む</button>";
}
function ending(){
document.getElementById("game").innerHTML =
"<h2>🎉Ver0.3.1クリア！</h2>" +
"<p>次回、森狼王編！</p>";
}
</script>
</body>
</html>
