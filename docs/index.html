<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>畑を守る剣 Ver0.3</title>
<style>
body{
font-family:sans-serif;
max-width:700px;
margin:auto;
padding:15px;
touch-action:manipulation;
}
button{
font-size:20px;
padding:12px;
margin:5px;
touch-action:manipulation;
}
#status{
background:#f5f5f5;
padding:10px;
margin-bottom:10px;
}
#game{
border:1px solid #ccc;
padding:15px;
min-height:250px;
}
</style>
</head>
<body>
<h1>🌾 畑を守る剣 🌾</h1>
<div id="status">
LV:<span id="lv">1</span>
　
HP:<span id="hp">30</span>
　
🌿薬草:<span id="herb">3</span>
</div>
<div id="game">
<p>🐔チャボ「コケーー！！」</p>
<p>小さな農村から冒険が始まる。</p>

はじめから

</div>
<script>
let player = {
lv:1,
hp:30,
herb:3
};
let enemyHp=0;
let enemyName="";
function updateStatus(){
document.getElementById("lv").innerText=player.lv;
document.getElementById("hp").innerText=player.hp;
document.getElementById("herb").innerText=player.herb;
}
function startGame(){
document.getElementById("game").innerHTML=
"<h2>第1話 はじまりの畑</h2>"+
"<p>👴村長『森で魔物が暴れておる！』</p>"+
"<p>🐔チャボ『コケッ！嫌な予感がするコケ！』</p>"+
"<button onclick='village()'>🏡村へ</button>";
}
function village(){
document.getElementById("game").innerHTML=
"<h2>🏡村</h2>"+
"<button onclick='chief()'>👴村長</button>"+
"<button onclick='field()'>🌾畑</button>"+
"<button onclick='forest()'>🌲森</button>";
}
function chief(){
document.getElementById("game").innerHTML=
"<h2>👴村長</h2>"+
"<p>『森の奥には森狼王がいるという噂じゃ…』</p>"+
"<button onclick='village()'>戻る</button>";
}
function field(){
document.getElementById("game").innerHTML=
"<h2>🌾畑</h2>"+
"<p>作物は今日も元気だ。</p>"+
"<p>🐔チャボ『コケ〜♪平和が一番コケ！』</p>"+
"<button onclick='village()'>戻る</button>";
}
function forest(){
enemyName="暴走モグラ";
enemyHp=15;
battleScreen();
}
function battleScreen(){
document.getElementById("game").innerHTML=
"<h2>⚔️戦闘</h2>"+
"<p>👹"+enemyName+" が現れた！</p>"+
"<p id='enemy'>敵HP:"+enemyHp+"</p>"+
"<button onclick='attack()'>⚔️攻撃</button>"+
"<button onclick='powerAttack()'>💥強打</button>"+
"<button onclick='useHerb()'>🌿薬草</button>";
}
function attack(){
enemyHp-=5;
afterAttack();
}
function powerAttack(){
enemyHp-=8;
afterAttack();
}
function useHerb(){
if(player.herb<=0){
alert("薬草がない！");
return;
}
player.herb--;
player.hp+=10;
if(player.hp>30){
player.hp=30;
}
updateStatus();
battleScreen();
}
function afterAttack(){
if(enemyHp<=0){
if(enemyName==="暴走モグラ"){
player.lv++;
updateStatus();
document.getElementById("game").innerHTML=
"<h2>🎉勝利！</h2>"+
"<p>暴走モグラを倒した！</p>"+
"<p>🐔チャボ『まだ奥に気配がするコケ…』</p>"+
"<button onclick='wolfKing()'>森の奥へ</button>";
return;
}
if(enemyName==="森狼王"){
player.lv++;
updateStatus();
document.getElementById("game").innerHTML=
"<h2>👑森狼王撃破！</h2>"+
"<p>村に平和が戻った！</p>"+
"<p>🐔チャボ『やったコケーー！！』</p>"+
"<h3>Ver0.3クリア！</h3>";
return;
}
}
document.getElementById("enemy").innerText=
"敵HP:"+enemyHp;
}
function wolfKing(){
enemyName="森狼王";
enemyHp=30;
battleScreen();
}
updateStatus();
</script>
</body>
</html>
